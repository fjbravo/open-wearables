# BYLab fork: rebase the long-lived `bylab/withings` branch onto `main`
#
# Trigger: every successful run of `bylab-sync-and-publish.yml` (which merges
# upstream/main into our fork's main) → we rebase bylab/withings on top of
# the new main so the Withings provider patches stay current.
#
# Failure mode: if rebase conflicts (rare — the BYLab patches add new files
# under `services/providers/withings/` and only touch four high-churn files:
# the ProviderName enum, factory, config, and an icon dir), the workflow
# does NOT auto-resolve. It opens an issue with the conflict file list and
# stops. Human resolution required, then we re-run via workflow_dispatch.
#
# Why a separate workflow: keeps the daily merge job simple and reversible
# (no force-pushes from there). bylab/withings is force-pushed only in this
# job, with `--force-with-lease` so concurrent pushes from a human dev are
# detected.

name: BYLab — rebase bylab/withings onto main

on:
  workflow_run:
    workflows: ["BYLab — sync upstream + publish images"]
    types: [completed]
  workflow_dispatch:

permissions:
  contents: write
  issues: write

concurrency:
  group: bylab-rebase-withings
  cancel-in-progress: false

jobs:
  rebase:
    # Only run if the upstream-sync workflow concluded successfully.
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout bylab/withings with full history
        uses: actions/checkout@v4
        with:
          ref: bylab/withings
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git identity
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'

      - name: Rebase onto origin/main
        id: rebase
        run: |
          set -e
          git fetch origin main
          BEFORE=$(git rev-parse HEAD)
          MAIN_HEAD=$(git rev-parse origin/main)
          MERGE_BASE=$(git merge-base HEAD origin/main)

          if [ "$MERGE_BASE" = "$MAIN_HEAD" ]; then
            echo "Already on top of origin/main — nothing to rebase."
            echo "rebased=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if git rebase origin/main; then
            AFTER=$(git rev-parse HEAD)
            echo "rebased=true" >> "$GITHUB_OUTPUT"
            echo "before=$BEFORE" >> "$GITHUB_OUTPUT"
            echo "after=$AFTER" >> "$GITHUB_OUTPUT"
          else
            echo "rebase_failed=true" >> "$GITHUB_OUTPUT"
            echo "Conflicting files:"
            git diff --name-only --diff-filter=U | tee /tmp/rebase-conflicts.txt
            git rebase --abort
            exit 1
          fi

      - name: Push (force-with-lease)
        if: steps.rebase.outputs.rebased == 'true'
        run: |
          git push --force-with-lease=bylab/withings origin bylab/withings

      - name: Open issue on conflict
        if: failure() && steps.rebase.outputs.rebase_failed == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let conflicts = '(no conflict file list captured)';
            try {
              conflicts = fs.readFileSync('/tmp/rebase-conflicts.txt', 'utf8').trim() || conflicts;
            } catch {}
            const body = [
              '`bylab/withings` could not be rebased onto `main` automatically.',
              '',
              '**Conflicting files:**',
              '```',
              conflicts,
              '```',
              '',
              `**Run**: ${context.payload.repository.html_url}/actions/runs/${context.runId}`,
              '',
              'To resolve manually:',
              '```bash',
              'git fetch origin',
              'git checkout bylab/withings',
              'git rebase origin/main   # resolve conflicts',
              'git push --force-with-lease',
              '```',
              '',
              'Once pushed, re-run this workflow via the Actions tab → "BYLab — rebase bylab/withings onto main" → Run workflow.',
            ].join('\n');
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `[bylab] bylab/withings rebase conflict on ${new Date().toISOString().slice(0, 10)}`,
              body,
              labels: ['bylab', 'rebase-conflict'],
            });
