# BYLab fork: build + publish container images from bylab/main
#
# bylab/main is the long-lived branch carrying BYLab-specific patches
# (Withings provider, body-tab fixes, etc.) on top of upstream. The
# images built here are what runs on BYLab servers (docker-03 via
# watchtower).
#
# Trigger: push to bylab/main, or manual dispatch.

name: BYLab — publish images

on:
  push:
    branches: [bylab/main]
  workflow_dispatch:

concurrency:
  group: bylab-publish-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: backend
            image: ghcr.io/fjbravo/open-wearables-platform
            context: ./backend
            dockerfile: ./backend/Dockerfile
            build_args: ''
          - name: frontend
            image: ghcr.io/fjbravo/open-wearables-frontend
            context: ./frontend
            dockerfile: ./frontend/Dockerfile
            build_args: |
              VITE_API_URL=https://wearables-api.bylab.io
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build + push ${{ matrix.name }}
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: |
            ${{ matrix.image }}:latest
            ${{ matrix.image }}:bylab-main
            ${{ matrix.image }}:sha-${{ github.sha }}
          build-args: ${{ matrix.build_args }}
          cache-from: type=registry,ref=${{ matrix.image }}:buildcache
          cache-to: type=registry,ref=${{ matrix.image }}:buildcache,mode=max
